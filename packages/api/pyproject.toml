[project]
name = "api"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "fastapi[standard]>=0.118.3",
    "keyring>=25.6.0",
    "loguru>=0.7.3",
    "procrastinate>=3.5.3",
    "psycopg[binary]>=3.2.11",
    "pydantic-settings>=2.11.0",
    "scalar-fastapi>=1.4.3",
]

[project.scripts]
api = "api:main"

[build-system]
requires = ["uv_build>=0.8.2,<0.9.0"]
build-backend = "uv_build"
