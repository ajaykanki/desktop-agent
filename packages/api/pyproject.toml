[project]
name = "api"
version = "0.1.0"
requires-python = ">=3.11.13"
dependencies = [
    "fastapi[standard]>=0.116.1",
    "loguru>=0.7.3",
    "pydantic-settings>=2.10.1",
    "scalar-fastapi>=1.4.1",
]

[project.scripts]
api = "api:main"

[build-system]
requires = ["uv_build>=0.8.16,<0.9.0"]
build-backend = "uv_build"
