[project]
name = "worker"
version = "0.1.0"
description = "Worker to execute desktop based tasks built on procrastinate"
readme = "README.md"
authors = [
    { name = "Ajay Kanki", email = "222144676+ajaykanki@users.noreply.github.com" }
]
requires-python = ">=3.13"
dependencies = [
    "keyring>=25.6.0",
    "loguru>=0.7.3",
    "procrastinate>=3.5.3",
    "psycopg[binary]>=3.2.10",
    "pydantic-settings>=2.1.0",
    "robocorp-tasks>=1.5.0",
    "fastexcel>=0.16.0",
    "openpyxl>=3.1.5",
    "polars>=1.34.0",
    "sap-gui-engine>=0.1.3",
    "xlsx2csv>=0.8.4",
    "xlsxwriter>=3.2.9",
]

[project.scripts]
worker = "worker:main"
defer_job = "worker.defer:defer_job"

[build-system]
requires = ["uv_build>=0.8.2,<0.9.0"]
build-backend = "uv_build"
