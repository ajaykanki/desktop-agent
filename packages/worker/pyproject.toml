[project]
name = "worker"
version = "0.1.0"
requires-python = ">=3.11.13"
dependencies = [
    "keyring>=25.6.0",
    "procrastinate>=3.5.3",
    "psycopg[binary]>=3.2.10",
    "shared",
]

[tool.uv.sources]
shared = { workspace = true }

[project.scripts]
worker = "worker.main:main"

[build-system]
requires = ["uv_build>=0.8.22,<0.9.0"]
build-backend = "uv_build"
